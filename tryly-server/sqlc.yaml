version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/repository/queries"
    schema: "./internal/repository/schema"
    gen:
      go:
        package: "queries"
        out: "./internal/repository/queries"
        sql_package: "pgx"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: true
        emit_interface: true

# Documentation:
# https://docs.sqlc.dev/en/latest/

# To generate:
# sqlc generate

# To use in code:
# import "github.com/yourusername/wemake/internal/repository/queries"
# queries := queries.New(db)
# result, err := queries.GetQuotation(ctx, quotationID)
