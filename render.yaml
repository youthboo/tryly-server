services:
  - type: web
    name: wemake-server
    runtime: go
    rootDir: tryly-server
    plan: free
    region: singapore
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/app
    startCommand: ./app
    includeFiles:
      - migration
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      # Set in dashboard to https://<your-service>.onrender.com (no trailing slash).
      - key: PUBLIC_BASE_URL
        sync: false
      # Option A: single URL from Cloudinary dashboard (API Key Settings → CLOUDINARY_URL)
      - key: CLOUDINARY_URL
        sync: false
      # Option B: or set all three (leave CLOUDINARY_URL empty)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Set in Render Dashboard (Neon / external Postgres). Do not commit credentials to git.
      - key: DATABASE_URL
        sync: false
